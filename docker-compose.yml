services:
  postgres:
    image: postgres:16-alpine
    container_name: openclaw_archive_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openclaw_archive}
      POSTGRES_USER: ${POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      # Postgres data — named volume, survives docker compose down
      - postgres_data:/var/lib/postgresql/data
      # Schema auto-applied on first run
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      # Только localhost — снаружи недоступно
      - "127.0.0.1:5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw} -d ${POSTGRES_DB:-openclaw_archive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Optional: static file server for media (useful for dashboard)
  # Uncomment to serve media at http://127.0.0.1:8089/media/
  # media:
  #   image: nginx:alpine
  #   container_name: openclaw_archive_media
  #   restart: unless-stopped
  #   volumes:
  #     - ./media:/usr/share/nginx/html/media:ro
  #   ports:
  #     - "127.0.0.1:8089:80"

volumes:
  postgres_data:
    driver: local
    # Data lives at: /var/lib/docker/volumes/persist-postgres_postgres_data/

# Media files live at: ./media/ (sibling to this file)
# Structure: ./media/{chat_id}/{YYYY-MM-DD}/{type}_{name}.ext
# Default path used by plugin: same directory as docker-compose.yml + /media
