services:
  postgres:
    image: postgres:16-alpine
    container_name: openclaw_archive_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openclaw_archive}
      POSTGRES_USER: ${POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw} -d ${POSTGRES_DB:-openclaw_archive}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  archive-bot:
    build: ./archive-bot
    container_name: openclaw_archive_bot
    restart: unless-stopped
    environment:
      ARCHIVE_BOT_TOKEN: ${ARCHIVE_BOT_TOKEN:?ARCHIVE_BOT_TOKEN is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-openclaw}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-openclaw_archive}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./media:/media   # for future media downloads

volumes:
  postgres_data:
    driver: local

# Media files: ./media/{chat_id}/{YYYY-MM-DD}/{type}_{name}.ext
